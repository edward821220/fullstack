services:
  # ── MS SQL Server (default) ────────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 5s
      retries: 10
      start_period: 30s
    profiles:
      - mssql-dex

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "fullstack_template"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    profiles:
      - postgres-dex

  # ── Dex (local OIDC provider) ──────────────────────────────────────────
  dex:
    image: ghcr.io/dexidp/dex:v2.45.1
    command: dex serve /etc/dex/config.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./docker/dex/config.yaml:/etc/dex/config.yaml:ro
    profiles:
      - mssql-dex
      - postgres-dex

volumes:
  pgdata:
  mssql_data:
