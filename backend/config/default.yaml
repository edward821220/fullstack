# ═══════════════════════════════════════════════════════════
# PRODUCTION-SAFE DEFAULT CONFIGURATION
# ═══════════════════════════════════════════════════════════
# This file is version-controlled and serves as the secure baseline.
# Every value here must be safe for production / bank on-prem deployment.
#
# To run locally, create config/local.yaml (gitignored):
#   cp config/local.example.yaml config/local.yaml
#
# Without local.yaml the server will refuse to start with insecure defaults.
# ═══════════════════════════════════════════════════════════

server:
  host: "0.0.0.0"
  port: 3001
  timeout_seconds: 30
  shutdown_timeout_seconds: 30
  tls:
    enabled: false
    cert_path: ""
    key_path: ""
  cors_origins: []

database:
  driver: mssql
  host: ""
  port: 1433
  database: ""
  username: ""
  password: ""
  max_connections: 20
  connect_retry_attempts: 5
  connect_retry_delay_ms: 2000
  encrypt: true

auth:
  enabled: true
  issuer_url: ""
  audience: []
  jwks_cache_duration_secs: 3600
  allowed_email_domains: []
  role_claim_source: "groups"
  discovery_mode: "discovery"
  manual_endpoints: null
  danger_accept_invalid_certs: false

observability:
  log_format: "json"
  log_level: "info"
  service_name: ""
  metrics_enabled: true
  otlp:
    enabled: false
    endpoint: ""
    protocol: "http"
    timeout_seconds: 5

grpc:
  enabled: false
  host: "0.0.0.0"
  port: 50051

audit:
  exporter: "syslog"
  syslog:
    host: ""
    port: 514
    protocol: "udp"
    facility: "local0"
