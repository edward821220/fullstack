# ═══════════════════════════════════════════════════════════
# LOCAL DEVELOPMENT CONFIGURATION
# ═══════════════════════════════════════════════════════════
# This file is a TEMPLATE. Copy it to local.yaml and customize.
# DO NOT EDIT THIS FILE DIRECTLY — your changes will be lost on git pull.
#
# SECURITY NOTES:
# - TLS is disabled (ok for localhost only)
# - Auth is disabled (ok for localhost only)
# - DB encryption is disabled (ok for local SQL Server with self-signed cert)
# - Passwords in this file are DEVELOPMENT-ONLY.
#
# For production, use environment variables or a secrets manager.
# ═══════════════════════════════════════════════════════════

server:
  environment: "local"
  tls:
    enabled: false
  cors_origins:
    - "http://localhost:3000"
  docs_enabled: true
  metrics_interval_seconds: 15

database:
  host: "localhost"
  port: 1433
  database: "fullstack_template"
  username: "sa"
  password: "YourStrong!Passw0rd"
  encrypt: false
  trust_cert: true
  run_migrations_on_startup: true

auth:
  enabled: true
  issuer_url: "http://localhost:8080/dex"
  audience:
    - "fullstack-template"
  require_email_verified: false
  # Local development: keep allow_all_domains false or true as needed.
  allow_all_domains: false

observability:
  log_format: "pretty"
  service_name: "fullstack-template"

grpc:
  enabled: false
  auth_enabled: false
  tls:
    enabled: false

rate_limit:
  # Disabled for local development to avoid throttling during rapid iteration.
  # Production default.yaml enables this with conservative limits.
  enabled: false
  requests_per_second: 100
  burst_size: 200

audit:
  exporter: "none"
  pii_mode: "full"
