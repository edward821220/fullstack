apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fullstack-template.fullname" . }}-backend
  labels:
    app: {{ include "fullstack-template.fullname" . }}-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "fullstack-template.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "fullstack-template.fullname" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.backend.restPort }}
              name: rest
            - containerPort: {{ .Values.service.backend.grpcPort }}
              name: grpc
          env:
            - name: APP_DATABASE__DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fullstack-template.fullname" . }}-secrets
                  key: database_url
            - name: APP_DATABASE__ENCRYPT
              value: {{ .Values.env.databaseEncrypt | toString | quote }}
            - name: APP_AUTH__ENABLED
              value: {{ .Values.env.authEnabled | toString | quote }}
            - name: APP_AUTH__ISSUER_URL
              value: {{ .Values.env.oidcIssuerUrl | quote }}
            {{- if .Values.env.authAudience }}
            - name: APP_AUTH__AUDIENCE
              value: {{ join "," .Values.env.authAudience | quote }}
            {{- end }}
            {{- if .Values.env.authAllowedEmailDomains }}
            - name: APP_AUTH__ALLOWED_EMAIL_DOMAINS
              value: {{ join "," .Values.env.authAllowedEmailDomains | quote }}
            {{- end }}
            - name: APP_AUTH__ROLE_CLAIM_SOURCE
              value: {{ .Values.env.authRoleClaimSource | default "groups" | quote }}
            - name: APP_AUTH__DISCOVERY_MODE
              value: {{ .Values.env.authDiscoveryMode | default "discovery" | quote }}
            {{- if eq .Values.env.authDiscoveryMode "manual" }}
            - name: APP_AUTH__MANUAL_ENDPOINTS__JWKS_URI
              value: {{ required "authManualJwksUri is required when discovery mode is manual" .Values.env.authManualJwksUri | quote }}
            - name: APP_AUTH__MANUAL_ENDPOINTS__ISSUER
              value: {{ required "authManualIssuer is required when discovery mode is manual" .Values.env.authManualIssuer | quote }}
            {{- end }}
            - name: APP_AUTH__DANGER_ACCEPT_INVALID_CERTS
              value: {{ .Values.env.authDangerAcceptInvalidCerts | toString | quote }}
            - name: APP_OBSERVABILITY__LOG_FORMAT
              value: "json"
            - name: APP_OBSERVABILITY__LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: rest
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: rest
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
