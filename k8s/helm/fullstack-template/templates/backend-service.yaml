apiVersion: v1
kind: Service
metadata:
  name: {{ include "fullstack-template.fullname" . }}-backend
  labels:
    app: {{ include "fullstack-template.fullname" . }}-backend
spec:
  type: {{ .Values.service.backend.type }}
  ports:
    - port: {{ .Values.service.backend.restPort }}
      targetPort: rest
      protocol: TCP
      name: rest
    - port: {{ .Values.service.backend.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app: {{ include "fullstack-template.fullname" . }}-backend
