pre-commit:
  parallel: true
  jobs:
    - name: backend-fmt
      glob: "backend/**/*.rs"
      run: mise exec -- cargo fmt --manifest-path backend/Cargo.toml --all -- --check
    - name: backend-lint
      glob: "backend/**/*.rs"
      run: mise exec -- cargo clippy --manifest-path backend/Cargo.toml --all-targets --all-features -- -D warnings
    - name: frontend-fmt
      glob: "frontend/**/*.{ts,tsx,js,jsx,json,css,md,mjs}"
      run: mise exec -- pnpm -C frontend format:check
    - name: frontend-lint
      glob: "frontend/**/*.{ts,tsx,js,jsx}"
      run: mise exec -- pnpm -C frontend lint
    - name: spellcheck
      glob: "**/*.{rs,ts,tsx,js,jsx,md,yml,yaml,toml,json}"
      run: mise exec -- typos --exclude frontend/pnpm-lock.yaml --exclude backend/Cargo.lock
