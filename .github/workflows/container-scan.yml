name: Container security scan
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docker/**"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/container-scan.yml"
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC

jobs:
  scan-backend:
    name: Scan backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build backend image
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          files: docker/docker-bake.hcl
          targets: backend
          load: true
          set: |
            *.platform=linux/amd64
            *.tags=fullstack-template-backend:scan
        env:
          GCP_PROJECT_ID: scan-local
          AR_REGION: us
          AR_REPO: fullstack-template
          TAG: scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fullstack-template-backend:scan
          format: sarif
          output: trivy-backend-results.sarif
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: always()
        with:
          sarif_file: trivy-backend-results.sarif

  scan-frontend:
    name: Scan frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build frontend image
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          files: docker/docker-bake.hcl
          targets: frontend
          load: true
          set: |
            *.platform=linux/amd64
            *.tags=fullstack-template-frontend:scan
        env:
          GCP_PROJECT_ID: scan-local
          AR_REGION: us
          AR_REPO: fullstack-template
          TAG: scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: fullstack-template-frontend:scan
          format: sarif
          output: trivy-frontend-results.sarif
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        if: always()
        with:
          sarif_file: trivy-frontend-results.sarif