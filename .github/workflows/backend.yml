name: Backend CI
on:
  push:
    paths:
      - "backend/**"
      - "proto/**"
      - "mise.toml"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "proto/**"
      - "mise.toml"
      - ".github/workflows/backend.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Full backend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - run: mise run check:be

