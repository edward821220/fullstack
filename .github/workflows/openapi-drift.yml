name: OpenAPI spec drift check
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - "proto/**"
      - "docs/openapi.json"
      - "mise.toml"
      - ".github/workflows/openapi-drift.yml"

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}

jobs:
  check:
    name: Verify OpenAPI spec is up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true
      - name: Add rustfmt and clippy components
        run: rustup component add --toolchain "$(rustup show active-toolchain | cut -d' ' -f1)" rustfmt clippy

      - name: Generate OpenAPI spec from backend
        run: |
          CARGO_TERM_COLOR=never cargo run -p server -- gen-openapi > /tmp/openapi.json
        working-directory: backend

      - name: Check OpenAPI spec is up-to-date
        run: |
          if ! diff -q /tmp/openapi.json docs/openapi.json; then
            echo "::error::docs/openapi.json is out of date. Run 'mise run openapi:gen:be' and commit the result."
            exit 1
          fi
