name: Frontend CI
on:
  push:
    paths:
      - "frontend/**"
      - "mise.toml"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "mise.toml"
      - ".github/workflows/frontend.yml"

jobs:
  check:
    name: Full frontend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - run: mise run check:fe
