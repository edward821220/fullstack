version: 2
updates:
  - package-ecosystem: cargo
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    groups:
      rust-patch:
        update-types:
          - patch
      rust-minor:
        update-types:
          - minor
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "eslint-config-next"
      dev-deps:
        dependency-type: development
        update-types:
          - patch
          - minor
      prod-patch:
        dependency-type: production
        update-types:
          - patch
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    versioning-strategy: increase

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    commit-message:
      prefix: "ci(deps)"
      include: scope
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci
